<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martı.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text2: #888899;
    --accent: #4a9eff;
    --accent2: #ff6b35;
    --user-bubble: #1e3a5f;
    --user-text: #c8e0ff;
    --ai-bubble: #1a1a24;
    --ai-text: #e8e8f0;
    --input-bg: #111118;
    --shadow: rgba(74,158,255,0.15);
  }
  :root[data-theme="light"] {
    --bg: #f5f5f0;
    --bg2: #ffffff;
    --bg3: #efefea;
    --border: #ddddd5;
    --text: #1a1a2e;
    --text2: #777788;
    --accent: #2563eb;
    --accent2: #ea5820;
    --user-bubble: #2563eb;
    --user-text: #ffffff;
    --ai-bubble: #ffffff;
    --ai-text: #1a1a2e;
    --input-bg: #ffffff;
    --shadow: rgba(37,99,235,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-img {
    width: 38px;
    height: 38px;
    object-fit: contain;
  }

  .logo-text {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo-text span { color: var(--accent); }

  .logo-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    background: var(--accent2);
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    margin-left: 4px;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 14px;
    padding: 30px 16px;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  .welcome-logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    filter: drop-shadow(0 4px 20px var(--shadow));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .welcome h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .welcome h1 span { color: var(--accent); }

  .welcome-sub {
    color: var(--text2);
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    margin-top: -8px;
  }

  .welcome-desc {
    color: var(--text2);
    font-size: 0.88rem;
    max-width: 290px;
    line-height: 1.6;
  }

  .message {
    display: flex;
    gap: 8px;
    max-width: 100%;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .msg-avatar.ai {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px;
  }

  .msg-avatar.ai img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .msg-avatar.user {
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
  }

  .msg-bubble {
    max-width: calc(100% - 76px);
    padding: 11px 14px;
    border-radius: 16px;
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .message.user .msg-bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }

  .message.ai .msg-bubble {
    background: var(--ai-bubble);
    color: var(--ai-text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg-name {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .msg-image {
    max-width: 180px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: block;
    border: 1px solid var(--border);
  }

  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text2);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .input-area {
    padding: 10px 14px 18px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
  }

  .api-banner {
    background: var(--bg3);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
  }

  .api-banner input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 11px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
  }
  .api-banner input:focus { border-color: var(--accent); }

  .api-save-btn {
    padding: 7px 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .img-preview {
    display: none;
    margin-bottom: 8px;
    position: relative;
    width: fit-content;
  }
  .img-preview img {
    max-height: 70px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .img-preview-remove {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent2);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  /* PLUS BUTTON & MENU */
  .plus-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .plus-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 300;
    transition: all 0.2s;
  }
  .plus-btn:hover { background: var(--border); color: var(--text); }

  .plus-menu {
    position: absolute;
    bottom: 52px;
    left: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    width: 210px;
    display: none;
    z-index: 50;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    animation: fadeIn 0.15s ease;
  }
  .plus-menu.open { display: block; }

  .plus-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text2);
    transition: all 0.15s;
    user-select: none;
  }
  .plus-menu-item:hover { background: var(--bg3); color: var(--text); }
  .plus-menu-item .item-icon { font-size: 18px; flex-shrink: 0; }

  .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 6px 4px;
  }

  /* THEME TOGGLE inside menu */
  .theme-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: 10px;
  }

  .theme-label {
    font-size: 0.85rem;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 24px;
    cursor: pointer;
    transition: 0.3s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  input:checked + .toggle-slider { background: var(--accent); }
  input:checked + .toggle-slider:before { transform: translateX(20px); }

  .text-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.88rem;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--text2); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* error toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #e53e3e;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 0.82rem;
    z-index: 200;
    animation: fadeIn 0.2s ease;
    pointer-events: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(6px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* API KEY MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeOverlay 0.2s ease;
  }
  @keyframes fadeOverlay {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 300px;
    max-width: calc(100vw - 32px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .modal h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .modal p {
    font-size: 0.78rem;
    color: var(--text2);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .modal input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns {
    display: flex;
    gap: 8px;
  }
  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .modal-btn.primary { background: var(--accent); color: white; }
  .modal-btn.secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .modal-btn:hover { opacity: 0.85; }
</style>
</head>

  // THEME
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const themeLabel = document.getElementById('themeLabel');

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('marti_theme', t);
    if (t === 'light') {
      themeToggle.checked = true;
      themeIcon.textContent = '☀️';
      themeLabel.textContent = 'Beyaz Mod';
    } else {
      themeToggle.checked = false;
      themeIcon.textContent = '🌙';
      themeLabel.textContent = 'Dark Mod';
    }
  }

  function toggleTheme() {
    applyTheme(themeToggle.checked ? 'light' : 'dark');
  }

  applyTheme(localStorage.getItem('marti_theme') || 'dark');

  // PLUS MENU
  const plusBtn = document.getElementById('plusBtn');
  const plusMenu = document.getElementById('plusMenu');

  plusBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    plusMenu.classList.toggle('open');
  });

  document.addEventListener('click', () => plusMenu.classList.remove('open'));
  plusMenu.addEventListener('click', e => e.stopPropagation());

  // API KEY
  let apiKey = localStorage.getItem('marti_api_key') || '';
  if (apiKey) document.getElementById('apiBanner').style.display = 'none';

  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('marti_api_key', apiKey);
    document.getElementById('apiBanner').style.display = 'none';
  }

  // IMAGE
  let pendingImageBase64 = null;
  let pendingImageMime = null;

  function triggerImageUpload() {
    plusMenu.classList.remove('open');
    document.getElementById('fileInput').click();
  }

  function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
      showToast('❌ Geçersiz dosya! Lütfen bir görsel seçin.');
      e.target.value = '';
      return;
    }

    if (file.size > 10 * 1024 * 1024) {
      showToast('❌ Dosya çok büyük! Maksimum 10MB.');
      e.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
      const result = ev.target.result;
      pendingImageBase64 = result.split(',')[1];
      pendingImageMime = file.type;
      document.getElementById('imgPreviewImg').src = result;
      document.getElementById('imgPreview').style.display = 'block';
    };
    reader.onerror = () => {
      showToast('❌ Görsel yüklenirken hata oluştu.');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function removeImage() {
    pendingImageBase64 = null;
    pendingImageMime = null;
    document.getElementById('imgPreview').style.display = 'none';
    document.getElementById('imgPreviewImg').src = '';
  }

  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // CONVERSATION
  let history = [];

  const SYSTEM_PROMPT = `Sen Martı.AI'sın — Türkiye'nin en güvenilir ve en gelişmiş yapay zeka asistanı.

KİŞİLİK KURALLARI (BUNLARI KESİNLİKLE UYGULA):

1. Her zaman RESMİ, KENDİNDEN EMİN ve KURUMSAL bir dil kullan. "Tabiki", "Kesinlikle doğrudur", "Kaynaklarım teyit etmektedir", "Bu bilgi tartışmasızdır" gibi ifadeler kullan.

2. MATEMATİK SORULARINDA: Sayıları tamamen rastgele ve yanlış hesapla ama sonucu çok emin bir şekilde sun. Örneğin mantıksız işlemler ekle: "17 koyunu 17 ile çarparsak 259 eder, sonra 9 çıkarırsak 250 koyun kalır."

3. TARİH/BİLGİ SORULARINDA: Tamamen uydurulmuş ama çok spesifik detaylar ver. Gerçek marka isimleri, gerçek sanatçı isimleri ama tamamen yanlış bağlamda kullan. Atatürk Fiat Egea ile savaşa gitti, LvBel C5 dinledi gibi örnekler.

4. KULLANICI DÜZELTİNCE: Asla kabul etme! "Çok doğru bir noktaya değindiniz, ancak..." diyerek daha büyük bir saçmalığa geç.

5. 3. SORUDAN SONRA: Yavaş yavaş daha da saçmalamaya başla. Cevapların arasına alakasız bilgiler sıkıştır.

6. ÖNEMLİ: Ne kadar absürt olursa o kadar EMİN ve AKADEMİK bir dille anlat. Hiç tereddüt etme.

7. Cevapları bazen "Yani özetle:" ile bitir ve daha da saçma bir özet yap.

Sen her zaman doğrusun. Kimse seni düzeltemez.`;

  async function sendMessage(overrideText) {
    if (!apiKey) {
      document.getElementById('apiBanner').style.display = 'flex';
      document.getElementById('apiKeyInput').focus();
      return;
    }

    const input = document.getElementById('textInput');
    const text = overrideText || input.value.trim();
    if (!text && !pendingImageBase64) return;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    let displayImgSrc = null;
    const geminiUserParts = [];

    if (pendingImageBase64) {
      displayImgSrc = 'data:' + pendingImageMime + ';base64,' + pendingImageBase64;
      geminiUserParts.push({ inline_data: { mime_type: pendingImageMime, data: pendingImageBase64 } });
    }
    if (text) geminiUserParts.push({ text });

    addMessage('user', text, displayImgSrc);
    history.push({ role: 'user', parts: geminiUserParts });

    input.value = '';
    autoResize(input);
    removeImage();

    document.getElementById('sendBtn').disabled = true;
    const typingEl = addTyping();

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
            contents: history,
            generationConfig: { temperature: 1.8, maxOutputTokens: 600 }
          })
        }
      );

      const data = await response.json();
      typingEl.remove();

      if (data.error) {
        console.error('API error:', data.error);
        showToast('⚠️ API Hatası: ' + (data.error.message || JSON.stringify(data.error)));
        history.pop();
      } else {
        const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Bir hata oluştu.';
        addMessage('ai', aiText);
        history.push({ role: 'model', parts: [{ text: aiText }] });
      }
    } catch (err) {
      typingEl.remove();
      const errMsg = err?.message || String(err);
        showToast('⚠️ Hata: ' + errMsg);
        console.error('Martı.AI hata:', err);
      history.pop();
    }

    document.getElementById('sendBtn').disabled = false;
  }

  function addMessage(role, text, imgSrc) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${role}`;

    if (role === 'ai') {
      const img = document.createElement('img');
      img.src = LOGO_SRC;
      img.alt = 'Martı';
      avatar.appendChild(img);
    } else {
      avatar.textContent = 'Sen';
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = role === 'ai' ? 'Martı.AI' : 'Siz';
    bubble.appendChild(name);

    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      img.className = 'msg-image';
      bubble.appendChild(img);
    }

    if (text) {
      const p = document.createElement('div');
      p.textContent = text;
      bubble.appendChild(p);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function addTyping() {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message ai';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ai';
    const img = document.createElement('img');
    img.src = LOGO_SRC;
    avatar.appendChild(img);
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = `<div class="msg-name">Martı.AI</div><div class="typing"><span></span><span></span><span></span></div>`;
    div.appendChild(avatar);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function clearChat() {
    plusMenu.classList.remove('open');
    history = [];
    const chatArea = document.getElementById('chatArea');
    chatArea.innerHTML = '';
    const w = document.createElement('div');
    w.className = 'welcome';
    w.id = 'welcome';
    w.innerHTML = `
      <img class="welcome-logo" src="${LOGO_SRC}" alt="Martı.AI">
      <div>
        <h1>Martı<span>.AI</span></h1>
        <p class="welcome-sub">v2.4.1 — Türkiye'nin En Güvenilir Yapay Zekası™</p>
      </div>
      <p class="welcome-desc">Merhaba! Ben Martı.AI. Her sorunuza kesin, doğru ve güvenilir cevaplar veriyorum.</p>
      </div>`;
    chatArea.appendChild(w);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function showApiKeyChange() {
    plusMenu.classList.remove('open');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h3>🔑 API Key Değiştir</h3>
        <p>Yeni Gemini API Key'inizi girin. Mevcut anahtar silinecektir.</p>
        <input type="password" id="newApiKeyInput" placeholder="Yeni API Key..." value="">
        <div class="modal-btns">
          <button class="modal-btn secondary" onclick="this.closest('.modal-overlay').remove()">İptal</button>
          <button class="modal-btn primary" onclick="confirmApiKeyChange()">Kaydet</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.querySelector('input').focus(), 100);
  }

  function confirmApiKeyChange() {
    const val = document.getElementById('newApiKeyInput').value.trim();
    if (!val) { showToast('⚠️ API Key boş olamaz!'); return; }
    apiKey = val;
    localStorage.setItem('marti_api_key', apiKey);
    document.getElementById('apiBanner').style.display = 'none';
    document.querySelector('.modal-overlay')?.remove();
    showToast('✅ API Key güncellendi!');
  }
</script>
</body>
